<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edith Bot | Secure Sender</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Edith Bot</h2>

        <div class="input-group">
            <input type="text" id="titleInput" placeholder="Subject / Title (optional)">
        </div>

        <div class="input-group">
            <textarea id="messageInput" placeholder="Type your message here..."></textarea>
        </div>

        <button id="sendBtn">Send Message</button>

        <p id="statusMessage" class="status"></p>
    </div>

    <!-- 🔐 Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3>Authentication</h3>
            <p>Enter your application password</p>
            
            <input type="password" id="modalPasswordInput" placeholder="••••••••">
            <p id="modalErrorMessage" class="error-text"></p>
            
            <button id="modalSubmitBtn">Verify & Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
